<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token 提取器 // 系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --panel-color: rgba(20, 20, 20, 0.8);
            --primary-color: #00f3ff; /* 赛博蓝 */
            --accent-color: #bc13fe;  /* 霓虹紫 */
            --success-color: #0aff00; /* 黑客绿 */
            --text-color: #e0e0e0;
            --grid-line: rgba(0, 243, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* 优先使用科技英文字体 */
            font-family: 'Share Tech Mono', 'Consolas', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航栏 */
        header {
            height: 60px;
            border-bottom: 1px solid var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            z-index: 10;
        }

        .brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand span { font-size: 14px; opacity: 0.8; font-weight: normal; font-family: 'Share Tech Mono'; }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: var(--success-color);
            font-family: 'Orbitron', sans-serif;
        }

        .blink {
            width: 10px;
            height: 10px;
            background-color: var(--success-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success-color);
            animation: blink-animation 2s infinite;
        }

        /* 主体布局 */
        main {
            flex: 1;
            display: flex;
            padding: 40px;
            gap: 40px;
            position: relative;
        }

        /* 左侧操作区 */
        .control-panel {
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 800px;
        }

        /* 右侧终端日志区 */
        .terminal-panel {
            flex: 2;
            background: #000;
            border: 1px solid var(--accent-color);
            border-radius: 4px;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.2);
            position: relative;
            opacity: 0.9;
        }
        
        .terminal-panel::before {
            content: "系统日志 // 输出流";
            position: absolute;
            top: 0;
            left: 0;
            background: var(--accent-color);
            color: #000;
            padding: 2px 10px;
            font-size: 12px;
            font-weight: bold;
        }

        .log-entry { margin-bottom: 8px; line-height: 1.4; }
        .log-time { color: #666; margin-right: 10px; }
        .log-info { color: var(--primary-color); }
        .log-success { color: var(--success-color); }
        .log-error { color: #ff0055; }
        .log-warn { color: #ffae00; }

        /* 区块样式 */
        section {
            background: rgba(20, 20, 20, 0.6);
            border-left: 4px solid var(--primary-color);
            padding: 25px;
            position: relative;
            transition: all 0.3s;
        }

        section:hover {
            background: rgba(30, 30, 40, 0.8);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            margin-bottom: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
        }

        h2::before {
            content: '>>';
            margin-right: 10px;
            color: var(--primary-color);
        }

        /* 输入框组件 */
        .input-wrapper {
            position: relative;
            margin-top: 15px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #333;
            transition: 0.3s;
        }

        .input-wrapper:focus-within {
            border-bottom-color: var(--primary-color);
            box-shadow: 0 5px 10px -5px rgba(0, 243, 255, 0.3);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--primary-color);
            font-family: 'Share Tech Mono', 'Microsoft YaHei', monospace;
            font-size: 16px;
            padding: 10px 0;
            outline: none;
        }

        input::placeholder { color: #444; font-family: 'Microsoft YaHei', sans-serif; font-style: italic;}

        /* 按钮组件 */
        .btn {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 10px 25px;
            /* 按钮字体用中文 */
            font-family: 'Orbitron', 'Microsoft YaHei', sans-serif;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            white-space: nowrap;
        }

        .btn:hover:not(:disabled) {
            background: var(--primary-color);
            color: #000;
            box-shadow: 0 0 20px var(--primary-color);
        }

        .btn:disabled {
            border-color: #444;
            color: #444;
            cursor: not-allowed;
        }

        .btn-copy {
            border-color: var(--accent-color);
            color: var(--accent-color);
            font-size: 12px;
            padding: 5px 15px;
            margin-left: 10px;
        }
        
        .btn-copy:hover {
            background: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 15px var(--accent-color);
        }

        /* 结果区域 */
        .result-box {
            margin-top: 30px;
            border: 1px dashed var(--success-color);
            padding: 20px;
            background: rgba(10, 255, 0, 0.05);
        }

        /* 底部装饰 */
        footer {
            height: 30px;
            background: #000;
            border-top: 1px solid #333;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 20px;
            font-size: 12px;
            color: #555;
            z-index: 10;
        }

        /* 动画 */
        @keyframes blink-animation {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* 扫描线效果 overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 99;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            main { flex-direction: column; padding: 20px; overflow-y: auto; }
            .terminal-panel { min-height: 200px; }
            body { overflow: auto; }
            header { padding: 0 20px; }
            .brand span { display: none; }
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <header>
        <div class="brand">TOKEN 提取器 <span style="font-size:0.5em; opacity:0.7">v2.1</span></div>
        <div class="status-indicator">
            系统在线 <div class="blink"></div>
        </div>
    </header>

    <main>
        <div class="control-panel">
            
            <section id="step1">
                <h2>步骤 01 // 初始化授权</h2>
                <div style="display: flex; gap: 20px; align-items: flex-end;">
                    <button id="genBtn" class="btn">生成授权链接</button>
                    <div class="input-wrapper" style="flex: 1; display: none;" id="authUrlWrapper">
                        <input type="text" id="authUrl" readonly value="">
                        <button class="btn btn-copy" id="openAuthBtn" onclick="openAuthUrl()">打开</button>
                        <button class="btn btn-copy" onclick="copy('authUrl', '授权链接')">复制</button>
                    </div>
                </div>
            </section>

            <section id="step2">
                <h2>步骤 02 // 注入回调</h2>
                <p style="color: #666; font-size: 12px; margin-bottom: 10px;">> 等待用户输入...</p>
                <div class="input-wrapper">
                    <input type="text" id="callbackUrl" placeholder="在此粘贴 http://localhost:1455/... 完整链接">
                    <button class="btn btn-copy" onclick="clearInput()">清空</button>
                </div>
                <div style="margin-top: 20px;">
                    <button id="extractBtn" class="btn" style="width: 100%">提取 Token</button>
                </div>
            </section>

            <section id="resultArea" class="hidden result-box">
                <h2 style="color: var(--success-color)">>> 操作成功</h2>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <label style="font-size: 12px; color: var(--success-color); font-weight: bold;">TOKEN 数据 // JSON</label>
                    <button class="btn btn-copy" onclick="copyJson()">复制 JSON</button>
                </div>
                <textarea id="tokenJson" readonly style="
                    width: 100%;
                    min-height: 220px;
                    background: rgba(0, 0, 0, 0.6);
                    border: 1px solid var(--success-color);
                    color: var(--success-color);
                    font-family: 'Consolas', 'Monaco', monospace;
                    font-size: 13px;
                    padding: 15px;
                    outline: none;
                    resize: vertical;
                    line-height: 1.5;
                    box-shadow: inset 0 0 10px rgba(10, 255, 0, 0.1);
                "></textarea>
            </section>
        </div>

        <div class="terminal-panel" id="terminal">
            <div class="log-entry">
                <span class="log-time">[系统]</span>
                <span class="log-info">界面已初始化。</span>
            </div>
            <div class="log-entry">
                <span class="log-time">[系统]</span>
                <span class="log-info">已连接到服务器（端口 3000）。</span>
            </div>
            <div class="log-entry">
                <span class="log-time">[系统]</span>
                <span class="log-info">等待用户指令...</span>
            </div>
        </div>
    </main>

    <footer>
        ZEABUR 部署 // 安全连接 // 严禁未授权访问
    </footer>

    <script>
        let sessionId = localStorage.getItem('oauth_session_id');
        const DEFAULT_CLIENT_ID = 'app_EMoamEEZ73f0CkXaXp7hrann';

        // 日志系统
        function log(msg, type = 'info') {
            const terminal = document.getElementById('terminal');
            const entry = document.createElement('div');
            entry.className = 'log-entry';

            const time = new Date().toLocaleTimeString('zh-CN', {hour12: false});
            let typeClass = 'log-info';
            if (type === 'success') typeClass = 'log-success';
            if (type === 'error') typeClass = 'log-error';
            if (type === 'warn') typeClass = 'log-warn';

            entry.innerHTML = `<span class="log-time">[${time}]</span><span class="${typeClass}">${msg}</span>`;
            terminal.appendChild(entry);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function copy(id, name) {
            const el = document.getElementById(id);
            el.select();
            navigator.clipboard.writeText(el.value).then(() => {
                log(`已复制到剪贴板：${name}。`, 'success');
            }).catch(err => {
                log(`剪贴板错误：${err}`, 'error');
            });
        }

        function copyJson() {
            const el = document.getElementById('tokenJson');
            el.select();
            navigator.clipboard.writeText(el.value).then(() => {
                log('已复制到剪贴板：TOKEN JSON 数据。', 'success');
            }).catch(err => {
                log(`剪贴板错误：${err}`, 'error');
            });
        }

        function openAuthUrl() {
            const url = document.getElementById('authUrl').value;
            if (!url) {
                log('没有可打开的授权链接。', 'error');
                return;
            }
            window.open(url, '_blank', 'noopener,noreferrer');
            log('已在新标签页打开授权链接。', 'info');
        }

        function clearInput() {
            document.getElementById('callbackUrl').value = '';
            log('输入框已清空。', 'warn');
        }


        async function parseApiResponse(res) {
            const rawText = await res.text();
            if (!rawText) return {};

            try {
                return JSON.parse(rawText);
            } catch {
                const snippet = rawText.slice(0, 180).replace(/\s+/g, ' ').trim();
                throw new Error(`服务器返回非 JSON 响应（HTTP ${res.status}）：${snippet}`);
            }
        }

        // 自动检测回调
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('code')) {
                document.getElementById('callbackUrl').value = window.location.href;
                log('已自动检测到回调，可以开始提取。', 'success');
            }
        };

        // 生成链接
        document.getElementById('genBtn').onclick = async () => {
            const btn = document.getElementById('genBtn');
            btn.disabled = true;
            log('正在启动授权流程...', 'info');

            try {
                const res = await fetch('/api/generate-auth-url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await parseApiResponse(res);

                if (data.success) {
                    document.getElementById('authUrl').value = data.data.authUrl;
                    document.getElementById('authUrlWrapper').style.display = 'flex';
                    sessionId = data.data.sessionId;
                    localStorage.setItem('oauth_session_id', sessionId);

                    log('已生成会话 ID：' + sessionId.substring(0, 8) + '...', 'info');
                    log('授权链接生成成功。', 'success');
                } else {
                    log('服务器错误：' + data.message, 'error');
                }
            } catch(e) {
                log('网络连接失败。', 'error');
            } finally {
                btn.disabled = false;
            }
        };

        // 提取 Token
        document.getElementById('extractBtn').onclick = async () => {
            const urlStr = document.getElementById('callbackUrl').value.trim();
            if (!urlStr) {
                log('错误：回调链接为空。', 'error');
                return;
            }

            log('正在解析回调数据...', 'info');

            try {
                let code = '';
                if (urlStr.includes('code=')) {
                    try {
                        const url = new URL(urlStr);
                        code = url.searchParams.get('code');
                    } catch {
                        const match = urlStr.match(/code=([^&]*)/);
                        if (match) code = match[1];
                    }
                } else {
                    code = urlStr;
                }

                if(!code) {
                    log('错误：授权码格式无效。', 'error');
                    return;
                }

                log('正在用授权码换取 Token...', 'info');

                const res = await fetch('/api/exchange-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, sessionId })
                });
                const data = await parseApiResponse(res);

                if (data.success) {
                    const payload = { ...data.data };
                    if (!payload.client_id) payload.client_id = DEFAULT_CLIENT_ID;

                    document.getElementById('tokenJson').value = JSON.stringify(payload, null, 2);
                    document.getElementById('resultArea').classList.remove('hidden');

                    log('Token 换取成功。', 'success');
                    log(`用户邮箱：${data.data.user_email || '未知'}`, 'info');
                    const cv = data.data.cyber_verification;
                    if (cv && cv.metadata && cv.metadata.verification_status) {
                        log(`Cyber 验证状态：${cv.metadata.verification_status}`, 'info');
                    } else if (cv && cv.error) {
                        log(`Cyber 验证状态获取失败：${cv.error}`, 'warn');
                    }
                    log('Token JSON 数据已就绪，点击"复制 JSON"复制。', 'success');
                } else {
                    const extra = data?.error?.error_description || data?.error?.message || '';
                    log('换取失败：' + data.message + (extra ? ` | ${extra}` : ''), 'error');
                    if (res.status === 429) {
                        log('OpenAI 返回 429（请求过于频繁），请稍后重试，或配置 OPENAI_CLIENT_ID/OPENAI_PROXY。', 'warn');
                    }
                }
            } catch(e) {
                log('严重流程错误：' + e.message, 'error');
            }
        };
    </script>
</body>
</html>
